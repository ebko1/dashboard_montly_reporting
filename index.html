if(lv==='l2'){const rlMaps=ds.map(d=>d.rev_l2||{});const allRK=new Set();rlMaps.forEach(m=>Object.keys(m).forEach(k=>allRK.add(k)));

h+='<tr class="rg"><td colspan="'+(MS.length+2)+'"></td></tr>';
const cvs=ds.map(d=>d.cost||0);const cvT=cvs.reduce((a,b)=>a+b,0);
CI.forEach(k=>{const vs=ds.map(d=>(d.cost_detail||{})[k]||0);const tot=vs.reduce((a,b)=>a+b,0);
if(tot||vs.some(v=>v)){h+='<tr class="r1"><td>'+k+'</td>'+vs.map(v=>'<td>'+fm(v)+'</td>').join('')+'<td>'+fm(tot)+'</td></tr>';
if(lv==='l2'){const subs=ds.map(d=>(d.l2_sub||{})[k]||{});const allSK=new Set();subs.forEach(m=>Object.keys(m).forEach(k2=>allSK.add(k2)));
allSK.forEach(sk=>{const sv=subs.map(m=>m[sk]||0);const sTot=sv.reduce((a,b)=>a+b,0);
if(sTot||sv.some(v=>v))h+='<tr class="ri"><td>'+sk+'</td>'+sv.map(v=>'<td>'+fm(v)+'</td>').join('')+'<td>'+fm(sTot)+'</td></tr>'})}}});
h+='<tr class="rs"><td>영업비용 합계</td>'+cvs.map(v=>'<td>'+fm(v)+'</td>').join('')+'<td>'+fm(cvT)+'</td></tr>';
const ops=ds.map(d=>d.op_profit||0);const opT=ops.reduce((a,b)=>a+b,0);
h+='<tr class="rs"><td>영업이익</td>'+ops.map(v=>'<td class="'+cl(v)+'">'+fm(v)+'</td>').join('')+'<td class="'+cl(opT)+'"><b>'+fm(opT)+'</b></td></tr>';
h+='<tr><td style="font-weight:600">영업이익률</td>'+ops.map((v,i)=>{const r=rvs[i];return '<td class="'+cl(v)+'">'+(r?(v/r*100).toFixed(1)+'%':'-')+'</td>'}).join('');
h+='<td class="'+cl(opT)+'">'+(rvT?(opT/rvT*100).toFixed(1)+'%':'-')+'</td></tr>';
const ers=ds.map(d=>d.extra_rev||0);const erT=ers.reduce((a,b)=>a+b,0);
const ecs=ds.map(d=>d.extra_cost||0);const ecT=ecs.reduce((a,b)=>a+b,0);
if(erT||ers.some(v=>v))h+='<tr class="rg"><td colspan="'+(MS.length+2)+'"></td></tr><tr class="r1"><td>영업외이익</td>'+ers.map(v=>'<td>'+fm(v)+'</td>').join('')+'<td>'+fm(erT)+'</td></tr>';
if(ecT||ecs.some(v=>v))h+='<tr class="r1"><td>영업외비용</td>'+ecs.map(v=>'<td>'+fm(v)+'</td>').join('')+'<td>'+fm(ecT)+'</td></tr>';
h+='</tbody></table></div>'}
ct.innerHTML=h||'<div style="padding:40px;text-align:center;color:#9ca3af">사업부를 선택하세요</div>'}
document.getElementById('tabs').onclick=e=>{if(!e.target.classList.contains('tab'))return;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));e.target.classList.add('on');
tab=e.target.dataset.t;['ov','pl','cp'].forEach(t=>{document.getElementById('t-'+t).classList.toggle('hid',t!==tab)});rA()};
document.getElementById('tgl').onclick=e=>{if(!e.target.classList.contains('b'))return;document.querySelectorAll('#tgl .b').forEach(b=>b.classList.remove('on'));e.target.classList.add('on');lv=e.target.dataset.l;rA()};
function rCL(){const ct=document.getElementById('clp');
const ds=MS.map(m=>{let r=0,c=0,p=0,er=0,ec=0;const rd={},cd={};
for(const b of BU){const d=D[b]?.[String(m)];if(!d)continue;
r+=d.revenue;c+=d.cost;p+=d.op_profit;er+=d.extra_rev||0;ec+=d.extra_cost||0;
for(const[k,v]of Object.entries(d.rev_detail||{}))rd[k]=(rd[k]||0)+v;
for(const[k,v]of Object.entries(d.cost_detail||{}))cd[k]=(cd[k]||0)+v;}
return{r,c,p,er,ec,rd,cd}});
const yt={r:0,c:0,p:0,er:0,ec:0,rd:{},cd:{}};
ds.forEach(d=>{yt.r+=d.r;yt.c+=d.c;yt.p+=d.p;yt.er+=d.er;yt.ec+=d.ec;
for(const[k,v]of Object.entries(d.rd))yt.rd[k]=(yt.rd[k]||0)+v;
for(const[k,v]of Object.entries(d.cd))yt.cd[k]=(yt.cd[k]||0)+v;});
let h='<thead><tr><th>항목</th>';MS.forEach(m=>{h+='<th>'+m+'월</th>'});h+='<th>YTD</th></tr></thead><tbody>';
h+='<tr class="r1"><td>매출액</td>'+ds.map(d=>'<td>'+fm(d.r)+'</td>').join('')+'<td><b>'+fm(yt.r)+'</b></td></tr>';
RI.forEach(k=>{const vs=ds.map(d=>d.rd[k]||0);const t=vs.reduce((a,b)=>a+b,0);
if(t||vs.some(v=>v))h+='<tr class="ri"><td>'+k+'</td>'+vs.map(v=>'<td>'+fm(v)+'</td>').join('')+'<td>'+fm(t)+'</td></tr>'});
h+='<tr class="rg"><td colspan="'+(MS.length+2)+'"></td></tr>';
h+='<tr class="r1"><td>영업비용 합계</td>'+ds.map(d=>'<td>'+fm(d.c)+'</td>').join('')+'<td><b>'+fm(yt.c)+'</b></td></tr>';
CI.forEach(k=>{const vs=ds.map(d=>d.cd[k]||0);const t=vs.reduce((a,b)=>a+b,0);
if(t||vs.some(v=>v))h+='<tr class="ri"><td>'+k+'</td>'+vs.map(v=>'<td>'+fm(v)+'</td>').join('')+'<td>'+fm(t)+'</td></tr>'});
h+='<tr class="rg"><td colspan="'+(MS.length+2)+'"></td></tr>';
h+='<tr class="rs"><td>영업이익</td>'+ds.map(d=>'<td class="'+cl(d.p)+'">'+fm(d.p)+'</td>').join('')+'<td class="'+cl(yt.p)+'"><b>'+fm(yt.p)+'</b></td></tr>';
h+='<tr><td style="font-weight:600">영업이익률</td>'+ds.map(d=>'<td class="'+cl(d.p)+'">'+(d.r?(d.p/d.r*100).toFixed(1)+'%':'-')+'</td>').join('')+'<td class="'+cl(yt.p)+'">'+(yt.r?(yt.p/yt.r*100).toFixed(1)+'%':'-')+'</td></tr>';
if(ds.some(d=>d.er))h+='<tr class="rg"><td colspan="'+(MS.length+2)+'"></td></tr><tr class="r1"><td>영업외이익</td>'+ds.map(d=>'<td>'+fm(d.er)+'</td>').join('')+'<td>'+fm(yt.er)+'</td></tr>';
if(ds.some(d=>d.ec))h+='<tr class="r1"><td>영업외비용</td>'+ds.map(d=>'<td>'+fm(d.ec)+'</td>').join('')+'<td>'+fm(yt.ec)+'</td></tr>';
h+='</tbody>';ct.innerHTML=h}
