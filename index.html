const RI=["수강료수입", "콘텐츠개발수입", "서비스매출", "게임매출", "매출할인"];
const MS=[1,2],ML=['1월','2월'];
let sel=new Set(BU),tab='ov',lv='l1',ch={};
const fm=v=>{if(!v)return'-';return(v/1e6).toLocaleString('ko-KR',{maximumFractionDigits:0})+'M'};
const fw=v=>v?v.toLocaleString('ko-KR')+'원':'-';
const cl=v=>v>=0?'p':'n';
function rF(){const c=document.getElementById('chips');let h='<div class="chip '+(sel.size===BU.length?'on':'')+'" data-b="*">전체</div>';
BU.forEach(b=>{h+='<div class="chip '+(sel.has(b)?'on':'')+'" data-b="'+b+'">'+b+'</div>'});c.innerHTML=h;
c.querySelectorAll('.chip').forEach(e=>e.onclick=()=>{const b=e.dataset.b;if(b==='*'){sel=sel.size===BU.length?new Set():new Set(BU)}else{sel.has(b)?sel.delete(b):sel.add(b)}rA()})}
function rK(){const ag=MS.map(m=>{let r=0,c=0,p=0;for(const b of sel){const d=D[b]?.[m];if(d){r+=d.revenue;c+=d.cost;p+=d.op_profit}}return{r,c,p}});
const tR=ag.reduce((s,a)=>s+a.r,0),tC=ag.reduce((s,a)=>s+a.c,0),tP=ag.reduce((s,a)=>s+a.p,0);
const mg=tR?(tP/tR*100).toFixed(1):'-';const chg=ag[0].r?((ag[1].r-ag[0].r)/ag[0].r*100).toFixed(1):'-';
const bc=[...sel].filter(b=>{let r=0;MS.forEach(m=>r+=(D[b]?.[m]?.revenue||0));return r>0}).length;
document.getElementById('kpi').innerHTML='<div class="kc"><div class="lb">누적 매출</div><div class="vl">'+fm(tR)+'</div><div class="sm">'+fw(tR)+'</div></div><div class="kc"><div class="lb">누적 비용</div><div class="vl">'+fm(tC)+'</div><div class="sm">'+fw(tC)+'</div></div><div class="kc"><div class="lb">영업이익</div><div class="vl '+cl(tP)+'">'+fm(tP)+'</div><div class="sm">이익률 '+mg+'%</div></div><div class="kc"><div class="lb">2월 vs 1월 매출</div><div class="vl '+(parseFloat(chg)>=0?'p':'n')+'">'+chg+'%</div><div class="sm">1월 '+fm(ag[0].r)+' → 2월 '+fm(ag[1].r)+'</div></div><div class="kc"><div class="lb">매출 발생 사업부</div><div class="vl">'+bc+'</div><div class="sm">/ '+sel.size+'개 선택</div></div>'}
function r1(){const ag=MS.map(m=>{let r=0,c=0,p=0;for(const b of sel){const d=D[b]?.[m];if(d){r+=d.revenue;c+=d.cost;p+=d.op_profit}}return{r,c,p}});
const x=document.getElementById('c1').getContext('2d');if(ch.c1)ch.c1.destroy();
ch.c1=new Chart(x,{type:'bar',data:{labels:ML,datasets:[{label:'매출',data:ag.map(a=>a.r),backgroundColor:'#6366f1',borderRadius:6,order:2},{label:'비용',data:ag.map(a=>a.c),backgroundColor:'#f87171',borderRadius:6,order:3},{label:'영업이익',data:ag.map(a=>a.p),type:'line',borderColor:'#10b981',borderWidth:3,pointRadius:6,pointBackgroundColor:'#10b981',fill:false,order:1}]},options:{responsive:true,interaction:{mode:'index',intersect:false},plugins:{tooltip:{callbacks:{label:c=>c.dataset.label+': '+fm(c.raw)}}},scales:{y:{ticks:{callback:v=>(v/1e9).toFixed(1)+'B'},grid:{color:'#f3f4f6'}},x:{grid:{display:false}}}}})}
function r2(){const a=[];for(const b of sel){let r=0;MS.forEach(m=>r+=(D[b]?.[m]?.revenue||0));if(r>0)a.push({b,r})}a.sort((x,y)=>y.r-x.r);
const co=['#6366f1','#8b5cf6','#a78bfa','#c4b5fd','#818cf8','#4f46e5','#7c3aed','#5b21b6','#4338ca','#3730a3','#312e81','#1e1b4b','#6d28d9'];
const x=document.getElementById('c2').getContext('2d');if(ch.c2)ch.c2.destroy();
ch.c2=new Chart(x,{type:'bar',data:{labels:a.map(d=>d.b),datasets:[{data:a.map(d=>d.r),backgroundColor:co,borderRadius:6}]},options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fm(c.raw)}}},scales:{x:{ticks:{callback:v=>(v/1e9).toFixed(1)+'B'}},y:{grid:{display:false}}}}})}
function r3(){const cm={};for(const b of sel){MS.forEach(m=>{const cd=D[b]?.[m]?.cost_detail;if(!cd)return;for(const[k,v]of Object.entries(cd)){if(v<0)cm[k]=(cm[k]||0)+Math.abs(v)}})}
const s=Object.entries(cm).sort((a,b)=>b[1]-a[1]);const t=s.slice(0,8);const e=s.slice(8).reduce((s,[,v])=>s+v,0);if(e>0)t.push(['기타',e]);
const co=['#ef4444','#f97316','#f59e0b','#84cc16','#22c55e','#14b8a6','#06b6d4','#3b82f6','#8b5cf6','#9ca3af'];
const x=document.getElementById('c3').getContext('2d');if(ch.c3)ch.c3.destroy();
ch.c3=new Chart(x,{type:'doughnut',data:{labels:t.map(d=>d[0]),datasets:[{data:t.map(d=>d[1]),backgroundColor:co,borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,plugins:{legend:{position:'right',labels:{font:{size:11},padding:8}},tooltip:{callbacks:{label:c=>c.label+': '+fm(-c.raw)}}}}})}
function r4(){const a=[];for(const b of sel){let p=0;MS.forEach(m=>p+=(D[b]?.[m]?.op_profit||0));a.push({b,p})}a.sort((x,y)=>y.p-x.p);
const x=document.getElementById('c4').getContext('2d');if(ch.c4)ch.c4.destroy();
ch.c4=new Chart(x,{type:'bar',data:{labels:a.map(d=>d.b),datasets:[{data:a.map(d=>d.p),backgroundColor:a.map(d=>d.p>=0?'#10b981':'#ef4444'),borderRadius:6}]},options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fm(c.raw)}}},scales:{x:{ticks:{callback:v=>(v/1e9).toFixed(1)+'B'}},y:{grid:{display:false}}}}})}
function rCT(){const bs=[...sel];let h='<thead><tr><th>사업부</th>';MS.forEach(m=>{h+='<th>'+m+'월 매출</th><th>'+m+'월 비용</th><th>'+m+'월 이익</th>'});
h+='<th>누적 이익</th><th>이익률</th></tr></thead><tbody>';let tR=0,tC=0,tP=0;
for(const b of bs){let r=0,c=0,p=0;h+='<tr><td>'+b+'</td>';MS.forEach(m=>{const d=D[b]?.[m]||{revenue:0,cost:0,op_profit:0};r+=d.revenue;c+=d.cost;p+=d.op_profit;
h+='<td>'+fm(d.revenue)+'</td><td>'+fm(d.cost)+'</td><td class="'+cl(d.op_profit)+'">'+fm(d.op_profit)+'</td>'});
const mg=r?(p/r*100).toFixed(1)+'%':'-';h+='<td class="'+cl(p)+'"><b>'+fm(p)+'</b></td><td class="'+cl(p)+'">'+mg+'</td></tr>';tR+=r;tC+=c;tP+=p}
h+='<tr class="rs"><td>합계</td>';MS.forEach(m=>{let mr=0,mc=0,mp=0;for(const b of sel){const d=D[b]?.[m]||{};mr+=d.revenue||0;mc+=d.cost||0;mp+=d.op_profit||0}
h+='<td>'+fm(mr)+'</td><td>'+fm(mc)+'</td><td class="'+cl(mp)+'">'+fm(mp)+'</td>'});
const tMg=tR?(tP/tR*100).toFixed(1)+'%':'-';h+='<td class="'+cl(tP)+'"><b>'+fm(tP)+'</b></td><td class="'+cl(tP)+'">'+tMg+'</td></tr></tbody>';
document.getElementById('cpt').innerHTML=h}
function rPL(){const ct=document.getElementById('t-pl');let h='';
for(const bu of [...sel]){const d1=D[bu]?.['1']||{},d2=D[bu]?.['2']||{};
h+='<div class="ps"><h3>'+bu+' \u2014 월별 손익계산서</h3><table><thead><tr><th>항목</th><th>1월</th><th>2월</th><th>합계</th></tr></thead><tbody>';
const rv1=d1.revenue||0,rv2=d2.revenue||0;
h+='<tr class="r1"><td>매출액</td><td>'+fm(rv1)+'</td><td>'+fm(rv2)+'</td><td><b>'+fm(rv1+rv2)+'</b></td></tr>';
if(lv==='l2'){const rl1=d1.rev_l2||{},rl2=d2.rev_l2||{};const allRK=new Set([...Object.keys(rl1),...Object.keys(rl2)]);
allRK.forEach(k=>{const v1=rl1[k]||0,v2=rl2[k]||0;
if(v1||v2)h+='<tr class="ri"><td>'+k+'</td><td>'+fm(v1)+'</td><td>'+fm(v2)+'</td><td>'+fm(v1+v2)+'</td></tr>'})}
h+='<tr class="rg"><td colspan="4"></td></tr>';
const cv1=d1.cost||0,cv2=d2.cost||0;
CI.forEach(k=>{const v1=(d1.cost_detail||{})[k]||0,v2=(d2.cost_detail||{})[k]||0;
if(v1||v2){h+='<tr class="r1"><td>'+k+'</td><td>'+fm(v1)+'</td><td>'+fm(v2)+'</td><td>'+fm(v1+v2)+'</td></tr>';
if(lv==='l2'){const s1=(d1.l2_sub||{})[k]||{},s2=(d2.l2_sub||{})[k]||{};const allK=new Set([...Object.keys(s1),...Object.keys(s2)]);
allK.forEach(sk=>{const sv1=s1[sk]||0,sv2=s2[sk]||0;
if(sv1||sv2)h+='<tr class="ri"><td>'+sk+'</td><td>'+fm(sv1)+'</td><td>'+fm(sv2)+'</td><td>'+fm(sv1+sv2)+'</td></tr>'})}}
});
h+='<tr class="rs"><td>영업비용 합계</td><td>'+fm(cv1)+'</td><td>'+fm(cv2)+'</td><td>'+fm(cv1+cv2)+'</td></tr>';
const op1=d1.op_profit||0,op2=d2.op_profit||0;
h+='<tr class="rs"><td>영업이익</td><td class="'+cl(op1)+'">'+fm(op1)+'</td><td class="'+cl(op2)+'">'+fm(op2)+'</td><td class="'+cl(op1+op2)+'"><b>'+fm(op1+op2)+'</b></td></tr>';
h+='<tr><td style="font-weight:600">영업이익률</td><td class="'+cl(op1)+'">'+(rv1?(op1/rv1*100).toFixed(1)+'%':'-')+'</td><td class="'+cl(op2)+'">'+(rv2?(op2/rv2*100).toFixed(1)+'%':'-')+'</td>';
const tR=rv1+rv2,tP=op1+op2;h+='<td class="'+cl(tP)+'">'+(tR?(tP/tR*100).toFixed(1)+'%':'-')+'</td></tr>';
const er1=d1.extra_rev||0,er2=d2.extra_rev||0,ec1=d1.extra_cost||0,ec2=d2.extra_cost||0;
if(er1||er2)h+='<tr class="rg"><td colspan="4"></td></tr><tr class="r1"><td>영업외이익</td><td>'+fm(er1)+'</td><td>'+fm(er2)+'</td><td>'+fm(er1+er2)+'</td></tr>';
if(ec1||ec2)h+='<tr class="r1"><td>영업외비용</td><td>'+fm(ec1)+'</td><td>'+fm(ec2)+'</td><td>'+fm(ec1+ec2)+'</td></tr>';
h+='</tbody></table></div>'}
ct.innerHTML=h||'<div style="padding:40px;text-align:center;color:#9ca3af">사업부를 선택하세요</div>'}
document.getElementById('tabs').onclick=e=>{if(!e.target.classList.contains('tab'))return;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));e.target.classList.add('on');
tab=e.target.dataset.t;['ov','pl','cp'].forEach(t=>{document.getElementById('t-'+t).classList.toggle('hid',t!==tab)});rA()};
document.getElementById('tgl').onclick=e=>{if(!e.target.classList.contains('b'))return;document.querySelectorAll('#tgl .b').forEach(b=>b.classList.remove('on'));e.target.classList.add('on');lv=e.target.dataset.l;rA()};
function rA(){rF();if(tab==='ov'){rK();r1();r2();r3()}if(tab==='pl')rPL();if(tab==='cp'){r4();rCT()}}
rA();
</script>
</body>
</html>
